<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Wave Range — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2;font-weight:700}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto;font-weight:400}
    .hud .time{margin-left:auto} .hud .hits{min-width:70px;text-align:right}
    .cross{position:fixed;top:50%;left:50%;width:24px;height:24px;margin:-12px 0 0 -12px;z-index:2;pointer-events:none}
    .cross::before,.cross::after{content:"";position:absolute;background:#fff;opacity:.85}
    .cross::before{left:11px;top:0;width:2px;height:24px}.cross::after{top:11px;left:0;height:2px;width:24px}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;text-align:center;
      color:#7d8493;font-size:.85rem;z-index:2;pointer-events:none}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.78);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px} .over button{all:unset;margin-top:14px;color:#0e0f13;
      background:#e0556b;font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← FPS</a><span class="time">⏱ <span id="time">30</span></span>
    <span class="hits">Hits: <span id="hits">0</span></span></div>
  <div class="cross"></div>
  <div class="hint">Drag to aim · tap to shoot</div>
  <div class="over" id="over"><div><h2 id="title">Time!</h2>
    <div>Hits <b id="finalScore">0</b> · Best <b id="best">0</b></div>
    <button id="again">Play again</button></div></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag, onTap } from './touch.js';
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    document.body.appendChild(renderer.domElement);

    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x10131b);
    scene.fog=new THREE.Fog(0x10131b,12,46);
    const camera=new THREE.PerspectiveCamera(72,1,0.1,100); camera.position.set(0,1.6,0);
    let yaw=0,pitch=0;
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(90,90),new THREE.MeshStandardMaterial({color:0x1b2030}));
    floor.rotation.x=-Math.PI/2; scene.add(floor);
    scene.add(new THREE.HemisphereLight(0xffffff,0x202840,1.0));
    const dl=new THREE.DirectionalLight(0xffffff,0.7); dl.position.set(4,8,2); scene.add(dl);

    const targets=[]; let hits, timeLeft, running, tStart;
    let best=+(localStorage.getItem('gamf-fps-best')||0);
    let seed=11; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;
    function spawn(){ const m=new THREE.Mesh(new THREE.SphereGeometry(0.55,20,16),
      new THREE.MeshStandardMaterial({color:0xe0556b,emissive:0x551020}));
      m.position.set((rnd()-0.5)*26, 0.8+rnd()*3.4, -7-rnd()*24);
      m.userData.vx=(rnd()-0.5)*0.04; scene.add(m); targets.push(m); }

    function reset(){ targets.splice(0).forEach(t=>scene.remove(t));
      for(let i=0;i<7;i++) spawn(); hits=0; timeLeft=30; running=true; tStart=null;
      document.getElementById('hits').textContent=0; document.getElementById('time').textContent=30;
      document.getElementById('over').classList.remove('show'); }

    onDrag(renderer.domElement,{ move:({dx,dy})=>{ yaw-=dx*0.004; pitch-=dy*0.004;
      pitch=Math.max(-1.2,Math.min(1.2,pitch)); }});
    const ray=new THREE.Raycaster();
    onTap(renderer.domElement,()=>{ if(!running) return; ray.setFromCamera({x:0,y:0},camera);
      const h=ray.intersectObjects(targets)[0]; if(h){ const i=targets.indexOf(h.object);
        scene.remove(h.object); targets.splice(i,1); hits++;
        document.getElementById('hits').textContent=hits; spawn(); } });

    function resize(){ renderer.setSize(innerWidth,innerHeight);
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
    addEventListener('resize',resize); resize();

    function end(){ running=false; if(hits>best){ best=hits; localStorage.setItem('gamf-fps-best',best); }
      document.getElementById('finalScore').textContent=hits; document.getElementById('best').textContent=best;
      document.getElementById('over').classList.add('show'); }
    document.getElementById('again').onclick=reset;

    function animate(ts){ if(running){ if(tStart==null) tStart=ts;
      timeLeft=Math.max(0,30-(ts-tStart)/1000); document.getElementById('time').textContent=Math.ceil(timeLeft);
      if(timeLeft<=0) end();
      for(const t of targets){ t.position.x+=t.userData.vx; if(Math.abs(t.position.x)>14) t.userData.vx*=-1; } }
      camera.rotation.set(0,0,0,'YXZ'); camera.rotateY(yaw); camera.rotateX(pitch);
      renderer.render(scene,camera); requestAnimationFrame(animate); }
    reset(); requestAnimationFrame(animate);
  </script>
</body>
</html>
