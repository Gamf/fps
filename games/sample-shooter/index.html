<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Target Range — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:14px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2;font-weight:700}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto;font-weight:400}
    .hud .time{margin-left:auto} .hud .score{min-width:64px;text-align:right}
    .hud .best{min-width:72px;text-align:right;color:#5fd1a6;font-weight:600}
    .cross{position:fixed;top:50%;left:50%;width:24px;height:24px;margin:-12px 0 0 -12px;z-index:2;pointer-events:none;
      filter:drop-shadow(0 0 4px rgba(95,209,166,.8))}
    .cross::before,.cross::after{content:"";position:absolute;background:#cfeede;opacity:.9}
    .cross::before{left:11px;top:0;width:2px;height:24px}.cross::after{top:11px;left:0;height:2px;width:24px}
    .cross span{position:absolute;inset:0;border:2px solid rgba(95,209,166,.5);border-radius:50%}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;text-align:center;
      color:#8a91a3;font-size:.82rem;z-index:2;pointer-events:none}
    .pausetag{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;font-weight:800;
      font-size:1.4rem;color:#cdd6ee;letter-spacing:.1em;display:none}
    .pausetag.show{display:block}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.82);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px;font-size:1.8rem}
    .over .sub{color:#aab2c6} .over .newbest{color:#5fd1a6;font-weight:700;margin-top:6px;min-height:1.1em}
    .over button{all:unset;margin-top:16px;color:#0e0f13;
      background:linear-gradient(135deg,#5fd1a6,#6c8cff);font-weight:700;padding:12px 24px;border-radius:12px;cursor:pointer}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← FPS</a><span class="time">⏱ <span id="time">45</span></span>
    <span class="score">Score: <b id="score">0</b></span>
    <span class="best">Best: <b id="bestHud">0</b></span></div>
  <div class="cross"><span></span></div>
  <div class="hint">drag / arrows to look · tap / space to shoot · P pause · R restart</div>
  <div class="pausetag" id="pausetag">PAUSED</div>
  <div class="over" id="over"><div><h2 id="title">Time!</h2>
    <div class="sub">Score <b id="finalScore">0</b> · Best <b id="best">0</b></div>
    <div class="newbest" id="newbest"></div>
    <button id="again">Play again</button></div></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag, onTap } from './touch.js';

    const SLUG='sample-shooter', BEST_KEY='gamf-fps-'+SLUG+'-best', DURATION=45;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    // Gradient sky.
    const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{
      top:{value:new THREE.Color(0x152033)},bot:{value:new THREE.Color(0x07090e)}},
      vertexShader:`varying vec3 v; void main(){ v=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
      fragmentShader:`varying vec3 v; uniform vec3 top; uniform vec3 bot;
        void main(){ float h=clamp((normalize(v).y+0.3),0.0,1.0); gl_FragColor=vec4(mix(bot,top,h),1.0);} `});
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(60,24,16),skyMat));
    scene.fog=new THREE.Fog(0x10131b,12,48);

    const camera=new THREE.PerspectiveCamera(70,1,0.1,100); camera.position.set(0,1.6,0);
    let yaw=0,pitch=0;

    const floor=new THREE.Mesh(new THREE.PlaneGeometry(100,100),
      new THREE.MeshStandardMaterial({color:0x161b29,roughness:0.95}));
    floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
    const grid=new THREE.GridHelper(100,50,0x2a3350,0x1c2236); grid.position.y=0.01;
    grid.material.transparent=true; grid.material.opacity=0.4; scene.add(grid);

    scene.add(new THREE.HemisphereLight(0xbfd2ff,0x202840,0.85));
    const dir=new THREE.DirectionalLight(0xffffff,1.1); dir.position.set(5,11,3);
    dir.castShadow=true; dir.shadow.mapSize.set(1024,1024);
    dir.shadow.camera.left=-28; dir.shadow.camera.right=28; dir.shadow.camera.top=28; dir.shadow.camera.bottom=-28;
    scene.add(dir);
    const fill=new THREE.PointLight(0x5fd1a6,0.45,55); fill.position.set(8,5,-12); scene.add(fill);

    let seed=7; const rand=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;

    // Concentric-ring target meshes (bullseye look). Random radius -> score weight.
    const targets=[];
    const ringGeo=new THREE.SphereGeometry(0.6,22,18);
    function spawnTarget(){
      const small=rand()<0.4;                  // small targets worth more
      const r=small?0.36:0.6;
      const col=new THREE.Color().setHSL(small?0.13:0.95,0.7,0.55);
      const m=new THREE.Mesh(new THREE.SphereGeometry(r,22,18),new THREE.MeshStandardMaterial({
        color:col,emissive:col.clone().multiplyScalar(0.35),roughness:0.35,metalness:0.45}));
      m.position.set((rand()-0.5)*24, 0.8+rand()*3.2, -6-rand()*22);
      m.castShadow=true; m.userData.pts=small?3:1; m.userData.r=r;
      const halo=new THREE.Mesh(new THREE.SphereGeometry(r*1.25,16,12),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.15}));
      m.add(halo);
      scene.add(m); targets.push(m);
    }

    // Particle bursts.
    const bursts=[]; const bGeo=new THREE.SphereGeometry(0.08,6,6);
    function burst(pos,color){
      for(let i=0;i<10;i++){ const p=new THREE.Mesh(bGeo,new THREE.MeshBasicMaterial({color,transparent:true}));
        p.position.copy(pos); p.userData.v=new THREE.Vector3((rand()-0.5)*0.3,(rand()-0.5)*0.3,(rand()-0.5)*0.3);
        p.userData.life=1; scene.add(p); bursts.push(p); } }
    function stepBursts(dt){ for(let i=bursts.length-1;i>=0;i--){ const p=bursts[i];
      p.position.addScaledVector(p.userData.v,dt*60); p.userData.v.multiplyScalar(0.92);
      p.userData.life-=dt*1.8; p.material.opacity=Math.max(0,p.userData.life);
      p.scale.setScalar(Math.max(0.1,p.userData.life));
      if(p.userData.life<=0){ scene.remove(p); bursts.splice(i,1); } } }

    let score, timeLeft, running, paused, tStart, pauseAcc, lastPause;
    let best=+(localStorage.getItem(BEST_KEY)||0);
    document.getElementById('bestHud').textContent=best;

    function reset(){
      targets.splice(0).forEach(t=>scene.remove(t));
      bursts.splice(0).forEach(t=>scene.remove(t));
      seed=7; for(let i=0;i<8;i++) spawnTarget();
      score=0; timeLeft=DURATION; running=true; paused=false; tStart=null; pauseAcc=0; lastPause=null;
      document.getElementById('score').textContent=0; document.getElementById('time').textContent=DURATION;
      document.getElementById('pausetag').classList.remove('show');
      document.getElementById('over').classList.remove('show');
    }

    onDrag(renderer.domElement,{ move:({dx,dy})=>{ if(paused) return;
      yaw-=dx*0.004; pitch-=dy*0.004; pitch=Math.max(-1.2,Math.min(1.2,pitch)); }});

    const raycaster=new THREE.Raycaster();
    function shoot(){ if(!running||paused) return; raycaster.setFromCamera({x:0,y:0},camera);
      const hit=raycaster.intersectObjects(targets,true)[0];
      if(hit){ let obj=hit.object; while(obj.parent && targets.indexOf(obj)<0) obj=obj.parent;
        const i=targets.indexOf(obj); if(i<0) return;
        burst(obj.position,obj.material.color);
        score+=obj.userData.pts; document.getElementById('score').textContent=score;
        scene.remove(obj); targets.splice(i,1); spawnTarget(); } }
    onTap(renderer.domElement,shoot);

    function togglePause(){ if(!running) return; paused=!paused;
      document.getElementById('pausetag').classList.toggle('show',paused); }

    const keys=new Set();
    addEventListener('keydown',e=>{ const k=e.key.toLowerCase();
      if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' ','enter','r','p'].includes(k)) e.preventDefault();
      if(k==='r'){ reset(); return; }
      if(k==='p'){ togglePause(); return; }
      if(k===' '||k==='enter'){ shoot(); return; }
      keys.add(k); });
    addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
    function keyboardAim(dt){ const sp=1.6*dt;
      if(keys.has('arrowleft')||keys.has('a')) yaw+=sp;
      if(keys.has('arrowright')||keys.has('d')) yaw-=sp;
      if(keys.has('arrowup')||keys.has('w')) pitch+=sp;
      if(keys.has('arrowdown')||keys.has('s')) pitch-=sp;
      pitch=Math.max(-1.2,Math.min(1.2,pitch)); }

    function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h);
      camera.aspect=w/h; camera.updateProjectionMatrix(); }
    addEventListener('resize',resize); resize();

    function end(){ running=false; const isBest=score>best;
      if(isBest){ best=score; localStorage.setItem(BEST_KEY,best); document.getElementById('bestHud').textContent=best; }
      document.getElementById('finalScore').textContent=score;
      document.getElementById('best').textContent=best;
      document.getElementById('newbest').textContent=isBest?'★ New best!':'';
      document.getElementById('over').classList.add('show'); }
    document.getElementById('again').onclick=reset;

    let prev=0;
    function animate(ts){
      const now=ts/1000; const dt=prev?Math.min(0.05,now-prev):0.016; prev=now;
      if(paused){ if(lastPause==null) lastPause=ts; }
      else if(lastPause!=null){ pauseAcc+=(ts-lastPause)/1000; lastPause=null; }
      if(running && !paused){
        if(tStart==null) tStart=ts;
        timeLeft=Math.max(0,DURATION-(ts-tStart)/1000+pauseAcc);
        document.getElementById('time').textContent=Math.ceil(timeLeft);
        if(timeLeft<=0) end();
        keyboardAim(dt); stepBursts(dt);
        for(const t of targets) t.rotation.y+=dt*0.6;
      }
      camera.rotation.set(0,0,0,'YXZ'); camera.rotateY(yaw); camera.rotateX(pitch);
      renderer.render(scene,camera); requestAnimationFrame(animate);
    }
    reset(); requestAnimationFrame(animate);
  </script>
</body>
</html>
