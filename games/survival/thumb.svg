<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- hell-arena ground band -->
  <rect width="320" height="200" fill="#efe6d2"/>
  <rect y="138" width="320" height="62" fill="#9b3a22"/>
  <rect y="138" width="320" height="8" fill="#7e2f1b"/>

  <!-- advancing horned demon -->
  <!-- horns -->
  <polygon points="118,84 100,40 130,74" fill="#efe6d2"/>
  <polygon points="202,84 220,40 190,74" fill="#efe6d2"/>
  <!-- head -->
  <path d="M160 60 q56 6 56 60 q0 40 -56 46 q-56 -6 -56 -46 q0 -54 56 -60 z" fill="#c8923a"/>
  <!-- brow ridge -->
  <path d="M118 102 q42 -22 84 0 l0 14 q-42 -16 -84 0 z" fill="#6f6a3b"/>
  <!-- eyes -->
  <polygon points="126,108 150,116 134,124" fill="#221f17"/>
  <polygon points="194,108 170,116 186,124" fill="#221f17"/>
  <!-- snarling mouth -->
  <path d="M132 142 q28 22 56 0 l-6 12 q-22 12 -44 0 z" fill="#221f17"/>
  <rect x="144" y="146" width="6" height="10" fill="#efe6d2"/>
  <rect x="158" y="148" width="6" height="11" fill="#efe6d2"/>
  <rect x="172" y="146" width="6" height="10" fill="#efe6d2"/>

  <!-- gun-sight crosshair framing the demon -->
  <circle cx="160" cy="108" r="86" fill="none" stroke="#221f17" stroke-width="5"/>
  <line x1="160" y1="6" x2="160" y2="46" stroke="#221f17" stroke-width="5"/>
  <line x1="160" y1="170" x2="160" y2="200" stroke="#221f17" stroke-width="5"/>
  <line x1="60" y1="108" x2="92" y2="108" stroke="#221f17" stroke-width="5"/>
  <line x1="228" y1="108" x2="260" y2="108" stroke="#221f17" stroke-width="5"/>
  <circle cx="160" cy="108" r="6" fill="#9b3a22"/>
</svg>
