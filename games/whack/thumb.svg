<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- cream ground -->
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- red cabinet board -->
  <rect x="34" y="70" width="252" height="108" rx="14" fill="#9b3a22"/>
  <!-- grassy green playfield -->
  <rect x="48" y="82" width="224" height="84" rx="8" fill="#6f6a3b"/>
  <!-- three dirt holes (dark) with brown rims -->
  <ellipse cx="96" cy="138" rx="30" ry="16" fill="#6b4a2c"/>
  <ellipse cx="96" cy="138" rx="22" ry="11" fill="#221f17"/>
  <ellipse cx="224" cy="138" rx="30" ry="16" fill="#6b4a2c"/>
  <ellipse cx="224" cy="138" rx="22" ry="11" fill="#221f17"/>
  <ellipse cx="160" cy="150" rx="34" ry="17" fill="#6b4a2c"/>
  <ellipse cx="160" cy="150" rx="25" ry="12" fill="#221f17"/>
  <!-- center mole popping up: brown body -->
  <ellipse cx="160" cy="124" rx="26" ry="27" fill="#6b4a30"/>
  <!-- ears -->
  <circle cx="140" cy="106" r="8" fill="#6b4a30"/>
  <circle cx="180" cy="106" r="8" fill="#6b4a30"/>
  <!-- eyes -->
  <circle cx="151" cy="120" r="5" fill="#efe6d2"/>
  <circle cx="169" cy="120" r="5" fill="#efe6d2"/>
  <circle cx="151" cy="121" r="2.4" fill="#221f17"/>
  <circle cx="169" cy="121" r="2.4" fill="#221f17"/>
  <!-- nose -->
  <circle cx="160" cy="132" r="5.5" fill="#9b3a22"/>
  <!-- mallet: ochre head + ink handle -->
  <rect x="228" y="34" width="56" height="30" rx="6" fill="#c8923a" transform="rotate(-22 256 49)"/>
  <rect x="226" y="58" width="14" height="64" rx="6" fill="#221f17" transform="rotate(-22 233 90)"/>
</svg>
