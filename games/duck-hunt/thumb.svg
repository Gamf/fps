<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- sky -->
  <rect width="320" height="200" fill="#f3ece0"/>
  <!-- distant foliage skyline -->
  <path d="M0 152 q22 -22 44 0 q22 -20 44 0 q22 -22 44 0 q22 -18 44 0 q22 -22 44 0 q22 -20 44 0 q22 -22 44 0 v48 H0 Z" fill="#6f6a3b"/>
  <!-- grassy field -->
  <rect y="160" width="320" height="40" fill="#6f6a3b"/>
  <rect y="172" width="320" height="28" fill="#c8923a" opacity="0.18"/>
  <!-- flying duck (oxblood body) -->
  <g transform="translate(112 78)">
    <!-- body -->
    <ellipse cx="0" cy="6" rx="34" ry="20" fill="#9b3a22"/>
    <!-- head -->
    <circle cx="26" cy="-8" r="14" fill="#221f17"/>
    <!-- beak -->
    <path d="M38 -8 l20 -3 l-2 9 Z" fill="#c8923a"/>
    <!-- eye -->
    <circle cx="29" cy="-11" r="2.4" fill="#f3ece0"/>
    <!-- raised wing -->
    <path d="M-6 0 q-16 -32 -36 -34 q14 22 24 30 Z" fill="#7a2c1a"/>
    <!-- lower wing -->
    <path d="M-6 8 q-18 18 -38 16 q18 -16 30 -20 Z" fill="#c8923a"/>
  </g>
  <!-- target crosshair -->
  <g transform="translate(214 70)" fill="none" stroke="#221f17" stroke-width="4">
    <circle cx="0" cy="0" r="26"/>
    <line x1="-38" y1="0" x2="-10" y2="0"/>
    <line x1="10" y1="0" x2="38" y2="0"/>
    <line x1="0" y1="-38" x2="0" y2="-10"/>
    <line x1="0" y1="10" x2="0" y2="38"/>
  </g>
  <circle cx="214" cy="70" r="4" fill="#9b3a22"/>
</svg>
