<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Wave Range — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2;font-weight:700}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto;font-weight:400}
    .hud .time{margin-left:auto} .hud .hits{min-width:62px;text-align:right}
    .hud .best{min-width:70px;text-align:right;color:#5fd1a6;font-weight:600}
    .cross{position:fixed;top:50%;left:50%;width:26px;height:26px;margin:-13px 0 0 -13px;z-index:2;pointer-events:none;
      filter:drop-shadow(0 0 4px rgba(96,140,255,.8))}
    .cross::before,.cross::after{content:"";position:absolute;background:#bcd0ff;opacity:.92}
    .cross::before{left:12px;top:0;width:2px;height:26px}.cross::after{top:12px;left:0;height:2px;width:26px}
    .cross span{position:absolute;inset:0;border:2px solid rgba(188,208,255,.55);border-radius:50%}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;text-align:center;
      color:#8a91a3;font-size:.82rem;z-index:2;pointer-events:none}
    .pausetag{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;font-weight:800;
      font-size:1.4rem;color:#cdd6ee;letter-spacing:.1em;display:none}
    .pausetag.show{display:block}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.82);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px;font-size:1.8rem}
    .over .sub{color:#aab2c6;margin-bottom:2px}
    .over .newbest{color:#5fd1a6;font-weight:700;margin-top:6px;min-height:1.1em}
    .over button{all:unset;margin-top:16px;color:#0e0f13;
      background:linear-gradient(135deg,#6c8cff,#5fd1a6);font-weight:700;padding:12px 24px;border-radius:12px;cursor:pointer}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← FPS</a><span class="time">⏱ <span id="time">30</span></span>
    <span class="hits">Hits: <span id="hits">0</span></span>
    <span class="best">Best: <span id="bestHud">0</span></span></div>
  <div class="cross"><span></span></div>
  <div class="hint">drag / arrows to aim · tap / space to shoot · P pause · R restart</div>
  <div class="pausetag" id="pausetag">PAUSED</div>
  <div class="over" id="over"><div><h2 id="title">Time!</h2>
    <div class="sub">Hits <b id="finalScore">0</b> · Best <b id="best">0</b></div>
    <div class="newbest" id="newbest"></div>
    <button id="again">Play again</button></div></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag, onTap } from './touch.js';

    const SLUG='wave-range', BEST_KEY='gamf-fps-'+SLUG+'-best';
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Gradient skybox via vertex-shaded sphere.
    const scene=new THREE.Scene();
    const skyGeo=new THREE.SphereGeometry(60,24,16);
    const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{
      top:{value:new THREE.Color(0x1a2238)},bot:{value:new THREE.Color(0x07090e)}},
      vertexShader:`varying vec3 v; void main(){ v=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
      fragmentShader:`varying vec3 v; uniform vec3 top; uniform vec3 bot;
        void main(){ float h=clamp((normalize(v).y+0.3)/1.0,0.0,1.0); gl_FragColor=vec4(mix(bot,top,h),1.0);} `});
    scene.add(new THREE.Mesh(skyGeo,skyMat));
    scene.fog=new THREE.Fog(0x10131b,14,52);

    const camera=new THREE.PerspectiveCamera(72,1,0.1,100); camera.position.set(0,1.6,0);
    let yaw=0,pitch=0;

    // Floor with grid accent.
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(120,120),
      new THREE.MeshStandardMaterial({color:0x161b29,roughness:0.95,metalness:0.0}));
    floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
    const grid=new THREE.GridHelper(120,60,0x2a3350,0x1c2236); grid.position.y=0.01;
    grid.material.transparent=true; grid.material.opacity=0.4; scene.add(grid);

    // Lights: ambient + key directional with shadows.
    scene.add(new THREE.HemisphereLight(0xbfd2ff,0x202840,0.85));
    const dl=new THREE.DirectionalLight(0xffffff,1.1); dl.position.set(6,12,4);
    dl.castShadow=true; dl.shadow.mapSize.set(1024,1024);
    dl.shadow.camera.left=-30; dl.shadow.camera.right=30; dl.shadow.camera.top=30; dl.shadow.camera.bottom=-30;
    scene.add(dl);
    const fill=new THREE.PointLight(0x6c8cff,0.5,60); fill.position.set(-8,6,-10); scene.add(fill);

    const DURATION=30;
    const targets=[]; let hits, timeLeft, running, paused, tStart, pauseAcc, lastPause;
    let best=+(localStorage.getItem(BEST_KEY)||0);
    document.getElementById('bestHud').textContent=best;
    let seed=11; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;

    const targGeo=new THREE.SphereGeometry(0.55,20,16);
    function spawn(){
      const hue=rnd();
      const col=new THREE.Color().setHSL(0.95+hue*0.12,0.7,0.55);
      const m=new THREE.Mesh(targGeo,new THREE.MeshStandardMaterial({
        color:col,emissive:col.clone().multiplyScalar(0.35),roughness:0.35,metalness:0.4}));
      m.position.set((rnd()-0.5)*26, 0.8+rnd()*3.4, -7-rnd()*24);
      m.castShadow=true; m.userData.vx=(rnd()-0.5)*0.05; scene.add(m); targets.push(m);
      // glow halo
      const halo=new THREE.Mesh(new THREE.SphereGeometry(0.72,16,12),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.16}));
      m.add(halo);
    }

    // Particle burst pool.
    const bursts=[];
    const burstGeo=new THREE.SphereGeometry(0.09,6,6);
    function burst(pos,color){
      for(let i=0;i<10;i++){
        const p=new THREE.Mesh(burstGeo,new THREE.MeshBasicMaterial({color,transparent:true}));
        p.position.copy(pos);
        p.userData.v=new THREE.Vector3((rnd()-0.5)*0.3,(rnd()-0.5)*0.3,(rnd()-0.5)*0.3);
        p.userData.life=1; scene.add(p); bursts.push(p);
      }
    }
    function stepBursts(dt){
      for(let i=bursts.length-1;i>=0;i--){ const p=bursts[i];
        p.position.addScaledVector(p.userData.v,dt*60); p.userData.v.multiplyScalar(0.92);
        p.userData.life-=dt*1.8; p.material.opacity=Math.max(0,p.userData.life);
        p.scale.setScalar(Math.max(0.1,p.userData.life));
        if(p.userData.life<=0){ scene.remove(p); bursts.splice(i,1); }
      }
    }

    function reset(){
      targets.splice(0).forEach(t=>scene.remove(t));
      bursts.splice(0).forEach(t=>scene.remove(t));
      seed=11; for(let i=0;i<7;i++) spawn();
      hits=0; timeLeft=DURATION; running=true; paused=false; tStart=null; pauseAcc=0; lastPause=null;
      document.getElementById('hits').textContent=0; document.getElementById('time').textContent=DURATION;
      document.getElementById('pausetag').classList.remove('show');
      document.getElementById('over').classList.remove('show');
    }

    onDrag(renderer.domElement,{ move:({dx,dy})=>{ if(paused) return; yaw-=dx*0.004; pitch-=dy*0.004;
      pitch=Math.max(-1.2,Math.min(1.2,pitch)); }});
    const ray=new THREE.Raycaster();
    function shoot(){ if(!running||paused) return; ray.setFromCamera({x:0,y:0},camera);
      const h=ray.intersectObjects(targets,true)[0];
      if(h){ let obj=h.object; while(obj.parent && targets.indexOf(obj)<0) obj=obj.parent;
        const i=targets.indexOf(obj); if(i<0) return;
        burst(obj.position,obj.material.color);
        scene.remove(obj); targets.splice(i,1); hits++;
        document.getElementById('hits').textContent=hits; spawn(); } }
    onTap(renderer.domElement,shoot);

    function togglePause(){ if(!running) return; paused=!paused;
      document.getElementById('pausetag').classList.toggle('show',paused); }

    // Keyboard controls.
    const keys=new Set();
    addEventListener('keydown',e=>{
      const k=e.key.toLowerCase();
      if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' ','enter','r','p'].includes(k)){
        e.preventDefault();
      }
      if(k==='r'){ reset(); return; }
      if(k==='p'){ togglePause(); return; }
      if(k===' '||k==='enter'){ shoot(); return; }
      keys.add(k);
    });
    addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
    function keyboardAim(dt){
      const sp=1.6*dt;
      if(keys.has('arrowleft')||keys.has('a')) yaw+=sp;
      if(keys.has('arrowright')||keys.has('d')) yaw-=sp;
      if(keys.has('arrowup')||keys.has('w')) pitch+=sp;
      if(keys.has('arrowdown')||keys.has('s')) pitch-=sp;
      pitch=Math.max(-1.2,Math.min(1.2,pitch));
    }

    function resize(){ renderer.setSize(innerWidth,innerHeight);
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
    addEventListener('resize',resize); resize();

    function end(){ running=false;
      const isBest=hits>best;
      if(isBest){ best=hits; localStorage.setItem(BEST_KEY,best); document.getElementById('bestHud').textContent=best; }
      document.getElementById('finalScore').textContent=hits;
      document.getElementById('best').textContent=best;
      document.getElementById('newbest').textContent=isBest?'★ New best!':'';
      document.getElementById('over').classList.add('show'); }
    document.getElementById('again').onclick=reset;

    let prev=0;
    function animate(ts){
      const now=ts/1000; const dt=prev?Math.min(0.05,now-prev):0.016; prev=now;
      // Pause-time accounting (so the countdown freezes while paused).
      if(paused){ if(lastPause==null) lastPause=ts; }
      else if(lastPause!=null){ pauseAcc+=(ts-lastPause)/1000; lastPause=null; }
      if(running && !paused){
        if(tStart==null) tStart=ts;
        timeLeft=Math.max(0,DURATION-(ts-tStart)/1000+pauseAcc);
        document.getElementById('time').textContent=Math.ceil(timeLeft);
        if(timeLeft<=0) end();
        for(const t of targets){ t.position.x+=t.userData.vx; if(Math.abs(t.position.x)>14) t.userData.vx*=-1;
          t.rotation.y+=dt; }
        keyboardAim(dt);
        stepBursts(dt);
      }
      camera.rotation.set(0,0,0,'YXZ'); camera.rotateY(yaw); camera.rotateX(pitch);
      renderer.render(scene,camera); requestAnimationFrame(animate);
    }
    reset(); requestAnimationFrame(animate);
  </script>
</body>
</html>
